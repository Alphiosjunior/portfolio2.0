version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: /
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
customRules:
  - source: </^(home|about|skills|education|projects|certifications|documents|contact)$/>  
    target: /index.html
    status: '200'
  - source: /<*>
    target: /index.html
    status: '200'
